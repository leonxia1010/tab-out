name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(node -p "require('./extension/manifest.json').version")
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' -> '$tag' but manifest.json version is '$manifest'"
            exit 1
          fi
          echo "version OK: $tag"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension zip
        run: |
          zip -r "tab-out-${GITHUB_REF_NAME}.zip" extension \
            -x 'extension/dashboard/src/*' \
            -x 'extension/options/src/*' \
            -x '*.map' \
            -x '*.d.ts' \
            -x '*/.DS_Store'
          ls -la tab-out-*.zip

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          body=$(awk -v tag="$tag" '
            $0 ~ "^## \\["tag"\\]" { flag=1; next }
            flag && /^## \[/       { exit }
            flag                   { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$body" | tr -d '[:space:]')" ]; then
            echo "no CHANGELOG section for $tag; will fall back to auto-generated notes"
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_body=true" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<EOF'
              echo "$body"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tab-out-*.zip
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.has_body != 'true' }}
          fail_on_unmatched_files: true
