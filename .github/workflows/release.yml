name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(node -p "require('./extension/manifest.json').version")
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' -> '$tag' but manifest.json version is '$manifest'"
            exit 1
          fi
          echo "version OK: $tag"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension zip
        run: |
          zip -r "tab-out-${GITHUB_REF_NAME}.zip" extension \
            -x 'extension/dashboard/src/*' \
            -x 'extension/options/src/*' \
            -x 'extension/shared/src/*' \
            -x '*.map' \
            -x '*.d.ts' \
            -x '*.tsbuildinfo' \
            -x '*/.DS_Store'
          ls -la tab-out-*.zip

      - name: Extract release notes from CHANGELOG
        id: notes
        # awk matches `## [tag]` exactly. If someone tags a version
        # without a matching CHANGELOG section (or writes `## 2.3.0`
        # instead of `## [2.3.0]`), we used to fall back to GitHub's
        # auto-generated notes — meaning the release page would silently
        # disagree with CHANGELOG.md. Fail the workflow instead so the
        # missing/malformed section is obvious before the release ships.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          body=$(awk -v tag="$tag" '
            $0 ~ "^## \\["tag"\\]" { flag=1; next }
            flag && /^## \[/       { exit }
            flag                   { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$body" | tr -d '[:space:]')" ]; then
            echo "::error::no CHANGELOG section for $tag — add '## [$tag]' before tagging"
            exit 1
          fi
          {
            echo 'body<<EOF'
            echo "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        # Pinned to the commit SHA of the v2 tag (as of 2026-04-18) so a
        # compromised/retargeted branch can't hand our release workflow
        # arbitrary code. Dependabot can bump this in place; bump the
        # comment when that happens.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: tab-out-*.zip
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true
